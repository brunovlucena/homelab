apiVersion: v1
kind: Service
metadata:
  name: {{ include "minio.fullname" . }}
  labels:
    component: {{ .Values.serviceMonitor.componentName }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: minio
      protocol: TCP
      name: minio
      nodePort: {{ .Values.service.nodePort }}
  selector:
    {{- include "minio.selectorLabels" . | nindent 4 }}
