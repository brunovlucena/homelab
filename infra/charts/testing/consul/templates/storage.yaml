---
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: consul-pv-claim
  labels:
    {{- include "consul.labels" . | nindent 4 }}
spec:
  storageClassName: rook-ceph-block
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.persistentVolumeClaim.storage }}
