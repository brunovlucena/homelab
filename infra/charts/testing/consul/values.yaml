# Default values for consul.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

HttpPort: 8500
RpcPort: 8400
SerflanPort: 8301
SerflanUdpPort: 8301
SerfwanPort: 8302
SerfwanUdpPort: 8302
ServerPort: 8300
ConsulDnsPort: 8600

image:
  repository: consul
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: consul

podSecurityContext: {}
  # fsGroup: 1000

persistentVolumeClaim:
  storage: "1Gi"

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths: []
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources:
  limits:
    cpu: "100m"
    memory: "512Mi"
  requests:
    cpu: "100m"
    memory: "512Mi"

nodeSelector: {}

tolerations: []

affinity: {}
