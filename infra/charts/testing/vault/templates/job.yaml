apiVersion: batch/v1
kind: Job
metadata:
  name: job-{{ include "vault.fullname" . }}
  annotations:
    "helm.sh": post-install
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  template:
    metadata:
      name: "{{ .Release.Name }}"
      labels:
        {{- include "vault.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsUser: 1000
      restartPolicy: Never
      containers:
      - name: config
        image: "vault:1.3.0"
        env:
          - name: VAULT_ADDR
            value: http://vault.vault:8200
          - name: VAULT_TOKEN
            value: s.AsFP4cExOkuztQX4tIq8P4RL
        command: ["/bin/sh", "-c"]
        args:
          - vault secrets enable database
          - vault write database/config/postgres plugin_name=postgresql-database-plugin allowed_roles="postgres-role" connection_url="postgresql://admin:admin123@postgres.postgres:5432/testdb?sslmode=disable"
          - vault write database/roles/postgres-role db_name=postgres creation_statements="CREATE ROLE \"{{name}}\" WITH LOGIN PASSWORD '{{password}}' VALID UNTIL '{{expiration}}'; GRANT SELECT ON ALL TABLES IN SCHEMA public TO \"{{name}}\";" default_ttl="1h" max_ttl="24h"
