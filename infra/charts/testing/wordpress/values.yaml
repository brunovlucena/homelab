# Default values for wordpress.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

persistentVolumeClaim:
  storage: 2Gi

serviceMonitor:
  componentName: app

replicaCount: 1

image:
  repository: wordpress
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: wordpress

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths: []
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources:
  wordpress: {}
  prometheus: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}
