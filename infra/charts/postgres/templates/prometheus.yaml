apiVersion: monitoring.coreos.com/v1
kind: Prometheus
metadata:
  name: prometheus
spec:
  serviceAccountName: prometheus-operator
  serviceMonitorSelector:
    matchLabels:
      component: {{ .Values.componentName | nindent 6 }}
  ruleSelector:
    matchLabels:
      component: {{ .Values.componentName | nindent 6 }}
  resources:
    {{- toYaml .Values.resources.operated | nindent 4 }}
  enableAdminAPI: true
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus-operated
  labels:
    {{ include "chart-postgres.labels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: proemtheus-operated-nodeport
  labels:
    {{- include "chart-postgres.prometheus" . | nindent 4 }}
spec:
  type: NodePort
  ports:
  - port: 9090
    nodePort: 30100
    targetPort: web
    protocol: TCP
    name: web
  selector:
    app: prometheus
    prometheus: kube-state-metrics
