---
apiVersion: monitoring.coreos.com/v1
kind: Prometheus
metadata:
  name: prometheus
spec:
  serviceAccountName: myapp-operator
  serviceMonitorSelector:
    matchLabels:
      {{- include "myapp.prometheus" . | nindent 6 }}
  ruleSelector:
    matchLabels:
      {{- include "myapp.prometheus" . | nindent 6 }}
  resources:
    {{- toYaml .Values.resources | nindent 4 }}
  enableAdminAPI: true
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus-operated
  labels:
    {{ include "myapp.labels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: proemtheus-operated-nodeport
  labels:
    {{- include "myapp.prometheus" . | nindent 4 }}
spec:
  type: NodePort
  ports:
  - port: 9090
    nodePort: 30001
    targetPort: web
    protocol: TCP
    name: web
  selector:
    app: prometheus
    prometheus: prometheus
