---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: prometheus-rules-myapp
  labels:
    {{- include "myapp.prometheus" . | nindent 4 }}
spec:
  groups:
  - name: ./myapp.rules
    rules:
    - alert: MyAppPanicCount
      expr: vector(1)
      for: 5m
      labels:
        severity: error
