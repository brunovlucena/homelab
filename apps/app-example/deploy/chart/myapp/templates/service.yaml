---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "myapp.fullname" . }}
  labels:
    {{- include "myapp.selectorLabels" . | nindent 6 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    "app": "myapp"
    "app.kubernetes.io/managed-by": "myapp-operator"
    "app.kubernetes.io/version": "v0.0.1"
