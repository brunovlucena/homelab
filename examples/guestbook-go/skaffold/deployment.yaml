---
apiVersion: v1
kind: Namespace
metadata:
  name: dev
---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: dev
  name: guestbook-go
  labels:
    app: guestbook
    component: backend
    role: master
spec:
  replicas: 1
  selector:
    matchLabels:
      component: backend
      role: master
  template:
    metadata:
      labels:
        component: backend
        role: master
    spec:
      #securityContext:
      containers:
        - name: backend
          #securityContext:
        image: "registry:5000/guestbook"
          ports:
          - containerPort: 8000
            name: http
          livenessProbe:
            httpGet:
              path: /
              port: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            timeoutSeconds: 5
